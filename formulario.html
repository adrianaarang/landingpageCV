<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto | Adriana Aránguez</title>
  <link rel="stylesheet" href="formulariostyle.css">
</head>

<body>
  <div class="contenedor">
    <h2>Contacto</h2>
    <p>Si quieres contactar conmigo para una oportunidad profesional, colaboración o proyecto, puedes escribirme aquí.</p>

    <form id="formularioContacto" novalidate>
      
      <div class="columna_1">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" placeholder="Tu nombre">
        <span id="errorNombre"></span>

        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="tuemail@email.com">
        <span id="errorEmail"></span>

        <label for="asunto">Asunto</label>
        <input type="text" id="asunto" placeholder="Motivo del mensaje">
        <span id="errorAsunto"></span>
      </div>

      <div class="columna_2">
        <label for="empresa">Empresa / Organización</label>
        <input type="text" id="empresa" placeholder="Opcional">

        <label for="mensaje">Mensaje</label>
        <textarea id="mensaje" rows="8" placeholder="Escribe aquí tu mensaje"></textarea>
        <span id="errorMensaje"></span>
      </div>

      <div class="adicionales">
        <label for="privacidad">
          <input type="checkbox" id="privacidad">
          He leído y acepto la política de privacidad
        </label>
      </div>

      <button type="submit">Enviar mensaje</button>
    </form>

    <p id="mensajeEnvio"></p>
  </div>

  <script src="landing.js"></script>
</body>
</html>
